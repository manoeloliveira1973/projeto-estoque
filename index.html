<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Estoque Manoel</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --p: #673ab7;
            --s: #2e7d32;
            --e: #d32f2f;
            --ed: #0275d8;
            --b: #ff9800;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            padding: 20px;
            color: var(--text);
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            align-items: end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
        }

        .input-group .hint {
            font-size: 10px;
            color: var(--e);
            font-weight: bold;
            margin-top: 2px;
        }

        input,
        select {
            padding: 12px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
        }

        .flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        button {
            padding: 12px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .btn-save {
            background: var(--s);
        }

        .btn-excel {
            background: #1d6f42;
        }

        .btn-ed {
            background: var(--ed);
            padding: 6px 10px;
        }

        .btn-del {
            background: var(--e);
            padding: 6px 10px;
        }

        .btn-backup {
            background: #444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #f8f9fa;
            font-size: 0.85rem;
            color: #666;
        }

        img.thumb {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
        }

        .estoque-baixo {
            color: var(--e);
            font-weight: bold;
        }

        #zoom-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #tela-login {
            position: fixed;
            inset: 0;
            background: var(--p);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="zoom-modal" onclick="this.style.display='none'"><img id="img-zoom"
            style="max-width:90%; border-radius:8px;"></div>

    <div id="tela-login">
        <div style="background:white; padding:40px; border-radius:10px; text-align:center; width: 300px;">
            <h2 style="color: var(--p);">🔐 Login</h2>
            <input type="text" id="usu" placeholder="Usuário" style="width: 90%; margin-bottom:10px;"><br>
            <input type="password" id="sen" placeholder="Senha" style="width: 90%; margin-bottom:20px;"><br>
            <button onclick="login()" style="background:var(--p); width:100%;">Acessar Sistema</button>
        </div>
    </div>

    <div id="app" style="display:none; max-width: 1200px; margin: auto;">

        <div class="flex" style="margin-bottom: 25px;">
            <h1>📦 Gestão Manoel</h1>
            <div class="flex">
                <div style="background:var(--p); color:white; padding:15px; border-radius:8px;">
                    Patrimônio: <strong id="valTotal">R$ 0,00</strong>
                </div>
                <button class="btn-backup" onclick="fazerBackup()">💾 Backup</button>
                <button onclick="sair()" style="background:var(--e);">Sair</button>
            </div>
        </div>

        <div class="card">
            <div class="flex">
                <h3>👥 Cadastro de Fornecedor</h3>
                <div class="flex">
                    <input type="text" placeholder="🔍 Buscar..." onkeyup="buscar('body-f', this.value)">
                    <button class="btn-excel" onclick="exportarExcel('tab-f', 'Fornecedores')">Excel</button>
                </div>
            </div>
            <div class="form-grid">
                <div class="input-group"><label>Nome</label><input type="text" id="fn" placeholder="Nome da empresa">
                </div>
                <div class="input-group"><label>CNPJ</label><input type="text" id="fc" placeholder="00.000.000/0001-00">
                </div>
                <div class="input-group"><label>Contato</label><input type="text" id="fe" placeholder="E-mail"></div>
                <div class="input-group"><label>Telefone</label><input type="text" id="ft"
                        placeholder="(00) 00000-0000"></div>
                <button onclick="salvarForn()" id="btn-f" class="btn-save">Salvar</button>
            </div>
            <table id="tab-f">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CNPJ</th>
                        <th>Contato</th>
                        <th>Telefone</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="body-f"></tbody>
            </table>
        </div>

        <div class="card">
            <div class="flex">
                <h3>📦 Cadastro de Produto</h3>
                <div class="flex">
                    <input type="text" placeholder="🔍 Buscar..." onkeyup="buscar('body-p', this.value)">
                    <button class="btn-excel" onclick="exportarExcel('tab-p', 'Produtos')">Excel</button>
                </div>
            </div>
            <div class="form-grid">
                <div class="input-group"><label>Produto</label><input type="text" id="pn" placeholder="Nome do item">
                </div>
                <div class="input-group"><label>Preço</label><input type="text" id="pp" placeholder="0.00"></div>
                <div class="input-group">
                    <label>Qtd</label>
                    <input type="number" id="pq" placeholder="0">
                </div>
                <div class="input-group"><label>Fornecedor</label><select id="pf"></select></div>
                <div class="input-group"><label>URL Foto</label><input type="text" id="pi"
                        placeholder="https://i.imgur.com/exemplo.jpg"></div>
                <button onclick="salvarProd()" id="btn-p" class="btn-save">Salvar</button>
            </div>
            <table id="tab-p">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Produto</th>
                        <th>Preço</th>
                        <th>Qtd</th>
                        <th>Total</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="body-p"></tbody>
            </table>
        </div>

        <div class="card">
            <div class="flex">
                <h3>📜 Histórico de Movimentações</h3>
                <div class="flex" style="background: #f0f0f0; padding: 8px; border-radius: 8px; gap: 8px;">
                    <select id="tempo-limpeza" style="padding: 5px; font-size: 13px;">
                        <option value="30">Mais de 30 dias</option>
                        <option value="tudo">Zerar Tudo</option>
                    </select>
                    <button onclick="executarLimpeza()" class="btn-del"
                        style="padding: 5px 12px; font-size: 12px;">Limpar</button>
                </div>
            </div>
            <table id="tab-h">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Produto</th>
                        <th>Tipo</th>
                        <th>Qtd</th>
                    </tr>
                </thead>
                <tbody id="body-h"></tbody>
            </table>
        </div>
    </div>

    <script>
        let idF = null, idP = null;

        async function login() {
            const u = document.getElementById('usu').value;
            const s = document.getElementById('sen').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: u, senha: s })
            });
            if (res.ok) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                carregar();
            } else alert("Acesso negado!");
        }

        async function carregar() {
            // Fornecedores
            const fs = await fetch('/fornecedores').then(r => r.json());
            document.getElementById('pf').innerHTML = '<option value="" disabled selected>Selecione um fornecedor</option>' +
                fs.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');
            document.getElementById('body-f').innerHTML = fs.map(i => `<tr>
                <td>${i.nome}</td>
                <td>${i.cnpj}</td>
                <td>${i.contato}</td>
                <td>${i.telefone || ''}</td>
                <td>
                    <button class="btn-ed" onclick="prepararF(${i.id},'${i.nome}','${i.cnpj}','${i.contato}','${i.telefone}')">Ed</button>
                    <button class="btn-del" onclick="remover('fornecedores',${i.id})">X</button>
                </td>
            </tr>`).join('');

            // Produtos
            const ps = await fetch('/produtos').then(r => r.json());
            let totalVal = 0;
            document.getElementById('body-p').innerHTML = ps.map(i => {
                const sub = parseFloat(i.preco) * parseInt(i.quantidade);
                totalVal += sub;
                const isBaixo = i.quantidade < 5;
                return `<tr>
<td><img src="${i.imagem ? '/proxy/' + i.imagem.split('public/')[1] : ''}" class="thumb" onerror="this.src='https://via.placeholder.com/50'" onclick="abrirZoom(this.src)" loading="lazy"></td>
                    <td>${i.nome}</td>
                    <td>R$ ${parseFloat(i.preco).toFixed(2)}</td>
                    <td class="${isBaixo ? 'estoque-baixo' : ''}">${i.quantidade} ${isBaixo ? '⚠️' : ''}</td>
                    <td>R$ ${sub.toFixed(2)}</td>
                    <td>
                        <button class="btn-ed" onclick="prepararP(${i.id},'${i.nome}',${i.preco},${i.quantidade},${i.fornecedor_id || 0},'${i.imagem || ''}'
                    )">Ed</button>
                        <button style="background:#ff9800;padding:6px 10px;" onclick="saidaEstoque(${i.id},'${i.nome}',${i.quantidade})">Saída</button>
                        <button class="btn-del" onclick="remover('produtos',${i.id})">X</button>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('valTotal').innerText = `R$ ${totalVal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

            // Histórico
            const hs = await fetch('/historico').then(r => r.json());
            document.getElementById('body-h').innerHTML = hs.map(i => `<tr><td>${new Date(i.data_hora).toLocaleString()}</td><td>${i.produto_nome}</td><td>${i.tipo}</td><td>${i.quantidade}</td></tr>`).join('');
        }

        async function salvarForn() {
            const nome = document.getElementById('fn').value;
            const cnpj = document.getElementById('fc').value;
            const contato = document.getElementById('fe').value;
            const telefone = document.getElementById('ft').value;

            if (!nome || !cnpj) return alert("⚠️ Preencha Nome e CNPJ");

            const d = { nome, cnpj, contato, telefone };
            const url = idF ? `/fornecedores/${idF}` : '/fornecedores';
            const res = await fetch(url, {
                method: idF ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(d)
            });

            if (res.ok) {
                alert(idF ? "✅ Atualizado!" : "✅ Cadastrado!");
                idF = null;
                ['fn', 'fc', 'fe', 'ft'].forEach(id => document.getElementById(id).value = '');
                carregar();
            } else {
                const erro = await res.json();
                alert("❌ " + (erro.erro || "Erro servidor"));
            }
        }

        async function salvarProd() {
            const nome = document.getElementById('pn').value.trim();
            const preco = document.getElementById('pp').value;
            const qtd = document.getElementById('pq').value;
            const fid = document.getElementById('pf').value;

            if (!nome || !preco || !qtd || !fid) return alert("⚠️ Todos os campos!");

            let res;
            const imagem = document.getElementById('pi').value.trim();
            const data = { nome, preco, quantidade: qtd, fornecedor_id: fid, imagem };
            res = await fetch(idP ? `/produtos/${idP}` : '/produtos', {
                method: idP ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert(idP ? "✅ Atualizado!" : "✅ Cadastrado!");
                idP = null;
                ['pn', 'pp', 'pq', 'pi'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('pf').value = '';
                carregar();
            } else {
                const erro = await res.json();
                alert("❌ " + (erro.erro || "Erro"));
            }
        }

        function prepararF(id, n, c, e, t) { idF = id;['fn', 'fc', 'fe', 'ft'].forEach((el, i) => document.getElementById(el).value = [n, c, e, t][i]); }
        function prepararP(id, n, p, q, f, img) { idP = id; document.getElementById('pn').value = n; document.getElementById('pp').value = p; document.getElementById('pq').value = q; document.getElementById('pf').value = f; document.getElementById('pi').value = img || ''; }
        async function remover(rota, id) {
            if (confirm("Excluir?")) {
                try {
                    const res = await fetch(`/${rota}/${id}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    carregar();
                } catch (err) {
                    alert(`❌ Erro ao excluir: ${err.message}`);
                }
            }
        }
        async function executarLimpeza() {
            const tipo = document.getElementById('tempo-limpeza').value;
            if (confirm("Limpar histórico?")) await fetch(`/historico?dias=${tipo}`, { method: 'DELETE' }); carregar();
        }
        function abrirZoom(src) {
            if (src && src.includes('supabase')) {
                src = '/proxy/' + src.split('public/')[1];
            }
            document.getElementById('img-zoom').src = src || '';
            document.getElementById('zoom-modal').style.display = 'flex';
        }
        function exportarExcel(id, nome) { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), `${nome}.xlsx`); }
        function fazerBackup() { window.location.href = '/backup'; }
        function sair() { location.reload(); }
        function buscar(id, t) { document.querySelectorAll(`#${id} tr`).forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(t.toLowerCase()) ? '' : 'none'); }

        // ✅ BOTÃO SAÍDA CORRIGIDO
        async function saidaEstoque(id, nome, estoqueAtual) {
            const qtdStr = prompt(`📦 Saída para "${nome}"\n\nEstoque atual: ${estoqueAtual}\n\nQuantidade:`);
            if (!qtdStr) return;

            const quantidadeSaida = parseInt(qtdStr);
            if (isNaN(quantidadeSaida) || quantidadeSaida <= 0) return alert('❌ Quantidade inválida!');
            if (quantidadeSaida > estoqueAtual) return alert('❌ Estoque insuficiente!');

            const res = await fetch(`/produtos/${id}/saida`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ quantidadeSaida })
            });

            if (res.ok) {
                alert(`✅ Saída OK!\n${quantidadeSaida}un → Estoque: ${estoqueAtual - quantidadeSaida}`);
                carregar();
            } else {
                const erro = await res.json();
                alert('❌ ' + (erro.erro || 'Erro'));
            }

        }
    </script>
</body>

</html
